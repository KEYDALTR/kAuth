##########################################################################
#
#   kAuth v1.0.2 - Giriş & Kayıt Dialog Sistemi
#   KEYDAL Network
#   Geliştirici: Egemen KEYDAL
#
##########################################################################

# ==================== VERİTABANI ====================
database:
  # sqlite veya mysql
  type: "sqlite"
  mysql:
    host: "localhost"
    port: 3306
    database: "kauth"
    username: "root"
    password: ""
    # HikariCP bağlantı havuzu boyutu
    pool-size: 10

# ==================== VELOCITY ====================
velocity:
  # Velocity proxy senkronizasyonu
  enabled: false

# ==================== E-POSTA AYARLARI ====================
email:
  # E-posta sistemi aktif/pasif
  enabled: false
  smtp:
    host: "smtp.gmail.com"
    port: 587
    username: ""
    password: ""
    from: "noreply@example.com"
    # STARTTLS kullan (587 portu için)
    starttls: true
    # SSL bağlantı (465 portu için)
    ssl: false
  verification:
    # Doğrulama kodu uzunluğu
    code-length: 6
    # Kod geçerlilik süresi (dakika)
    code-expiry-minutes: 10
    # Kayıt sırasında e-posta doğrulaması zorunlu mu
    required-on-register: true
  templates:
    verification-subject: "kAuth - E-Posta Doğrulama"
    verification-body: "Doğrulama kodunuz: %code%\nBu kod %expiry% dakika geçerlidir."
    reset-subject: "kAuth - Şifre Sıfırlama"
    reset-body: "Şifre sıfırlama kodunuz: %code%\nBu kod %expiry% dakika geçerlidir."

# ==================== LOGLAMA ====================
logging:
  # Giriş/kayıt/çıkış olaylarını konsola logla
  enabled: true
  # Log formatı
  login: "[kAuth] %player% başarıyla giriş yaptı. (IP: %ip%)"
  register: "[kAuth] %player% yeni hesap oluşturdu. (IP: %ip%)"
  logout: "[kAuth] %player% çıkış yaptı."
  failed-login: "[kAuth] %player% yanlış şifre girdi. (Deneme: %attempts%) (IP: %ip%)"
  kick-timeout: "[kAuth] %player% süre dolduğu için atıldı."
  kick-attempts: "[kAuth] %player% çok fazla yanlış deneme yaptığı için atıldı."
  rule-accepted: "[kAuth] %player% sunucu kurallarını kabul etti. (IP: %ip%, Tarih: %date%)"
  rule-declined: "[kAuth] %player% sunucu kurallarını reddetti. (IP: %ip%, Tarih: %date%)"
  password-changed: "[kAuth] %player% şifresini değiştirdi. (IP: %ip%)"

# ==================== GİRİŞ AYARLARI ====================
auth:
  min-password-length: 4
  max-password-length: 30
  # Giriş yapma süresi (saniye) - süre dolunca oyuncu atılır (0 = devre dışı)
  login-timeout: 60
  # Maksimum yanlış şifre denemesi (0 = sınırsız)
  max-login-attempts: 5
  # Oturum sistemi - aynı IP ile tekrar girişte şifre sorma (dakika, 0 = devre dışı)
  session-timeout: 30
  # Giriş yapmadan önce oyuncuya körlük efekti ver
  blind-effect: true
  # Giriş yapmadan önce oyuncuyu dondur (hareket engelle)
  freeze-player: true
  # Giriş yapmadan önce sohbeti engelle
  block-chat: true
  # Giriş yapmadan önce komutları engelle
  block-commands: true
  # İzin verilen komutlar (giriş yapmadan kullanılabilir)
  allowed-commands:
    - "/kauth"
    - "/ka"
    - "/giris"
    - "/kayit"
    - "/cikis"
    - "/login"
    - "/register"
    - "/logout"
    - "/l"
    - "/reg"
    - "/dogrula"
    - "/verify"
    - "/sifresifirla"
    - "/resetpassword"
    - "/rp"
  # Zayıf şifreleri engelle (123456, qwerty, oyuncu adı vs.)
  block-weak-passwords: true
  # IP bazlı brute-force koruması - bu kadar denemeden sonra IP engellenir
  max-ip-attempts: 20
  # IP engellenme süresi (dakika)
  ip-block-minutes: 10
  # Aynı IP'den maksimum hesap sayısı (0 = sınırsız)
  max-accounts-per-ip: 3
  # Son giriş bilgisini göster (IP ve zaman)
  show-last-login: true
  # Timeout kick mesajı
  timeout-kick-message: "<color:#FF6B6B>Giriş süresi doldu! Tekrar bağlanınız.</color>"
  # Max deneme kick mesajı
  max-attempts-kick-message: "<color:#FF6B6B>Çok fazla yanlış deneme! Tekrar bağlanınız.</color>"

# ==================== DİALOG AYARLARI ====================
dialog:
  canCloseWithEscape: false
  columns: 2

# ==================== GİRİŞ DİALOGU ====================
login:
  title: "<color:#00D4FF>KEYDAL</color> <color:#3A4F6A>│</color> <color:#4AEAFF>Giriş Yap</color>"
  body:
    - ""
    - "<gradient:#00D4FF:#4AEAFF:#2E5CFF>KEYDAL NETWORK</gradient>"
    - ""
    - "<color:#B0C4D4>Hoş geldiniz! Hesabınıza giriş yapınız.</color>"
    - ""
  width: 200
  actions:
    - type: submit
      label: "<color:#4AEAFF>Giriş Yap</color>"
  # İptal butonu
  cancel-label: "<color:#FF6B6B>İptal</color>"

# ==================== KAYIT DİALOGU ====================
register:
  title: "<color:#00D4FF>KEYDAL</color> <color:#3A4F6A>│</color> <color:#C8E0FF>Kayıt Ol</color>"
  body:
    - ""
    - "<gradient:#00D4FF:#4AEAFF:#2E5CFF>KEYDAL NETWORK</gradient>"
    - ""
    - "<color:#B0C4D4>Yeni bir hesap oluşturunuz.</color>"
    - ""
  width: 200
  email_input:
    enabled: false
    label: "E-Posta"
  actions:
    - type: submit
      label: "<color:#C8E0FF>Kayıt Ol</color>"
  cancel-label: "<color:#FF6B6B>İptal</color>"

# ==================== KURAL DİALOGU ====================
rule:
  enabled: true
  title: "<color:#00D4FF>KEYDAL</color> <color:#3A4F6A>│</color> <color:#8FA8B8>Sunucu Kuralları</color>"
  body:
    - ""
    - "<gradient:#00D4FF:#4AEAFF:#2E5CFF>KEYDAL NETWORK</gradient>"
    - ""
    - "<color:#4AEAFF>1.</color> <color:#B0C4D4>Hile, hack ve haksız avantaj kullanımı yasaktır.</color>"
    - "<color:#4AEAFF>2.</color> <color:#B0C4D4>Reklam yapmak ve spam atmak yasaktır.</color>"
    - "<color:#4AEAFF>3.</color> <color:#B0C4D4>Diğer oyunculara hakaret ve küfür yasaktır.</color>"
    - "<color:#4AEAFF>4.</color> <color:#B0C4D4>Bug/açık kullanımı yasaktır, bildirin.</color>"
    - "<color:#4AEAFF>5.</color> <color:#B0C4D4>Yetkililerin kararlarına saygı gösterin.</color>"
    - ""
    - "<color:#B0C4D4>Kuralları kabul etmek için</color> <color:#4AEAFF>Onayla</color> <color:#B0C4D4>butonuna basın.</color>"
  confirmButton: "<color:#4AEAFF>Onayla</color>"
  # Kabul etmeme kick mesajı
  decline-kick-message: "<color:#FF6B6B>Kuralları kabul etmediniz.</color>"
  agree:
    enabled: true
    key: "agree"
    label: "<color:#B0C4D4>Kuralları okudum ve kabul ediyorum</color>"

# ==================== GÖRSEL EFEKTLER ====================
effects:
  # === Giriş yapmadan önce (bekleme ekranı) ===
  waiting:
    # Actionbar mesajı (sürekli gösterilir)
    actionbar:
      enabled: true
      message: "<color:#FF6B6B>⚠</color> <color:#B0C4D4>Lütfen giriş yapınız veya kayıt olunuz!</color> <color:#FF6B6B>⚠</color>"
      update-ticks: 20
    # Title (girişte bir kere gösterilir)
    title:
      enabled: true
      title: "<gradient:#00D4FF:#4AEAFF:#2E5CFF>KEYDAL</gradient>"
      subtitle: "<color:#B0C4D4>Giriş yapmak için dialogu kullanınız</color>"
      fade-in: 10
      stay: 60
      fade-out: 20

  # === Başarılı giriş sonrası ===
  login-success:
    title:
      enabled: true
      title: "<color:#4AEAFF>Hoş Geldiniz!</color>"
      subtitle: "<color:#B0C4D4>%player_name%, KEYDAL Network'e giriş yaptınız</color>"
      fade-in: 5
      stay: 40
      fade-out: 10
    sound:
      enabled: true
      type: "ENTITY_PLAYER_LEVELUP"
      volume: 0.7
      pitch: 1.5
    actionbar:
      enabled: true
      message: "<color:#4AEAFF>✔ Başarıyla giriş yapıldı!</color>"

  # === Başarılı kayıt sonrası ===
  register-success:
    title:
      enabled: true
      title: "<color:#C8E0FF>Kayıt Başarılı!</color>"
      subtitle: "<color:#B0C4D4>%player_name%, hesabınız oluşturuldu</color>"
      fade-in: 5
      stay: 40
      fade-out: 10
    sound:
      enabled: true
      type: "ENTITY_PLAYER_LEVELUP"
      volume: 0.8
      pitch: 1.2
    actionbar:
      enabled: true
      message: "<color:#C8E0FF>✔ Hesabınız başarıyla oluşturuldu!</color>"

  # === Yanlış şifre girişi ===
  login-fail:
    title:
      enabled: true
      title: "<color:#FF6B6B>Yanlış Şifre!</color>"
      subtitle: "<color:#B0C4D4>Tekrar deneyiniz</color>"
      fade-in: 5
      stay: 20
      fade-out: 10
    sound:
      enabled: true
      type: "ENTITY_VILLAGER_NO"
      volume: 0.8
      pitch: 1.0

  # === Çıkış yaptığında ===
  logout:
    title:
      enabled: true
      title: "<color:#8FA8B8>Çıkış Yapıldı</color>"
      subtitle: "<color:#B0C4D4>Tekrar giriş yapmanız gerekmektedir</color>"
      fade-in: 5
      stay: 30
      fade-out: 10
    sound:
      enabled: true
      type: "BLOCK_NOTE_BLOCK_BASS"
      volume: 0.8
      pitch: 0.5

